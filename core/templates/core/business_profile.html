{% extends 'core/base_business.html' %}

{% block page_title %}Profile{% endblock %}

{% block business_content %}
<style>
    .section-card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        margin-bottom: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .btn-save {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        background: var(--secondary);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }
    .profile-container {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 32px;
    }
    .profile-avatar-wrapper {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .profile-avatar {
        width: 180px;
        height: 180px;
        border-radius: 12px;
        border: 3px solid var(--primary);
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f7ff;
    }
    .profile-avatar img {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover;
    }
    .upload-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--secondary);
        border: none;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: absolute;
        bottom: 0;
        right: 0;
    }
    .avatar-wrapper {
        position: relative;
        display: inline-block;
    }
    .join-date {
        font-size: 13px;
        color: #666;
        margin-top: 8px;
    }
    .profile-details-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-color);
    }
    .form-group input, .form-group select {
        padding: 10px 14px;
        background: #f0f0f0;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
    }
    .section-title {
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
    }
    .section-title i {
        background: #f0f0f0;
        width: 30px;
        height: 30px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
    }
    .detail-row {
        display: flex;
        gap: 8px;
        font-size: 14px;
        color: var(--text-color);
        margin-bottom: 8px;
    }
    .detail-row label {
        width: 130px;
        color: #666;
        flex-shrink: 0;
    }
</style>

<h2>Profile</h2>

<div class="section-card">
    <div class="section-header">
        <h3>Edit Profile</h3>
        <button class="btn-save">Save Changes</button>
    </div>

    <div class="profile-container">
        <div class="profile-avatar-wrapper">
            <div class="avatar-wrapper">
                <div class="profile-avatar">
                    <img src="https://ui-avatars.com/api/?name=Business+Team&background=FFA726&color=fff&size=300" alt="Profile">
                </div>
                <button class="upload-btn"><i class="fas fa-plus"></i></button>
            </div>
            <p class="join-date">Join on: 12/12/2024</p>
        </div>
        <div class="profile-details-grid">
            <div class="form-group">
                <label>Name</label>
                <input type="text" value="Business Team">
            </div>
            <div class="form-group">
                <label>Office Mail</label>
                <input type="email" value="business@vetritsystems.com">
            </div>
            <div class="form-group">
                <label>Personal Mail</label>
                <input type="email" value="businessteam@gmail.com">
            </div>
            <div class="form-group">
                <label>Phone No</label>
                <input type="text" value="1234567890">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select>
                    <option selected>Female</option>
                    <option>Male</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="text" value="26/03/1990">
            </div>
        </div>
    </div>
</div>

<div class="section-card">
    <h3 class="section-title"><i class="fas fa-id-card"></i> Professional Details</h3>
    <div class="detail-row">
        <label>Role & Position</label>
        <span>: Business Team</span>
    </div>
    <div class="detail-row">
        <label>Branch</label>
        <span>: Surandai, Tirunelveli</span>
    </div>
</div>
{% endblock %}
