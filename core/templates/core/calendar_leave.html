{% extends 'core/base_admin.html' %}

{% block page_title %}Calendar & Leave{% endblock %}

{% block admin_content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Calendar & Leave Schedule</h2>
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
        <div>
            <h3 style="margin-bottom: 16px;">Leave Requests</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #f8f9fa;">
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Batch</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Date</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Day</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Reason</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding: 12px; border-bottom: 1px solid #eee;">Batch A</td>
                        <td style="padding: 12px; border-bottom: 1px solid #eee;">2025-01-15</td>
                        <td style="padding: 12px; border-bottom: 1px solid #eee;">Wednesday</td>
                        <td style="padding: 12px; border-bottom: 1px solid #eee;">Public Holiday</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div>
            <h3 style="margin-bottom: 16px;">Quick Actions</h3>
            <button style="width: 100%; background-color: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer;">Add Leave</button>
            <button style="width: 100%; background-color: var(--secondary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">Generate Schedule</button>
        </div>
    </div>
</div>
{% endblock %}
