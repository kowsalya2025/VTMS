{% extends 'core/base_trainer.html' %}

{% block page_title %}Profile{% endblock %}

{% block trainer_content %}
<style>
    .section-card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        margin-bottom: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .btn-save {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        background: var(--secondary);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }
    .profile-container {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 32px;
    }
    .profile-avatar-wrapper {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .profile-avatar {
        width: 180px;
        height: 180px;
        border-radius: 12px;
        border: 3px solid var(--primary);
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f7ff;
    }
    .profile-avatar img {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover;
    }
    .upload-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--secondary);
        border: none;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: absolute;
        bottom: 0;
        right: 0;
    }
    .avatar-wrapper {
        position: relative;
        display: inline-block;
    }
    .join-date {
        font-size: 13px;
        color: #666;
        margin-top: 8px;
    }
    .profile-details-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-color);
    }
    .form-group input, .form-group select {
        padding: 10px 14px;
        background: #f0f0f0;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
    }
    .section-title {
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
    }
    .section-title i {
        background: #f0f0f0;
        width: 30px;
        height: 30px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
    }
    .detail-row {
        display: flex;
        gap: 8px;
        font-size: 14px;
        color: var(--text-color);
        margin-bottom: 8px;
    }
    .detail-row label {
        width: 130px;
        color: #666;
        flex-shrink: 0;
    }
</style>

<form method="POST">
    {% csrf_token %}
    <div class="section-card">
        <div class="section-header">
            <h3>Edit Profile</h3>
            <button type="submit" class="btn-save">Save Changes</button>
        </div>

        <div class="profile-container">
            <div class="profile-avatar-wrapper">
                <div class="avatar-wrapper">
                    <div class="profile-avatar">
                        <img src="https://ui-avatars.com/api/?name={{ trainer.full_name|default:'Trainer' }}&background=FFA726&color=fff&size=300" alt="Profile">
                    </div>
                    <button type="button" class="upload-btn"><i class="fas fa-plus"></i></button>
                </div>
                <p class="join-date">Role: Trainer</p>
            </div>
            <div class="profile-details-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ trainer.full_name|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Office Mail</label>
                    <input type="email" name="office_mail" value="{{ trainer.office_mail|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Personal Mail</label>
                    <input type="email" name="personal_mail" value="{{ trainer.personal_mail|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Phone No</label>
                    <input type="text" name="phone_no" value="{{ trainer.phone_no|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="Male" {% if trainer.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if trainer.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if trainer.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    {% if trainer.course %}
    <div class="section-card">
        <h3 class="section-title"><i class="fas fa-id-card"></i> Professional Details</h3>
        <div class="detail-row">
            <label>Course</label>
            <span>: {{ trainer.course.title }}</span>
        </div>
        <div class="detail-row">
            <label>Status</label>
            <span>: {{ trainer.status }}</span>
        </div>
    </div>
    {% endif %}
</form>
{% endblock %}
