{% extends 'core/base_admin.html' %}

{% block page_title %}{{ 'Edit Intern' if intern else 'Add Intern' }}{% endblock %}

{% block admin_content %}
<style>
    .page-header {
        margin-bottom: 32px;
    }
    .back-btn {
        color: var(--primary);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 16px;
    }
    .section-card {
        background-color: var(--white);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .section-card h4 {
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        margin-bottom: 20px;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .form-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }
    .form-row-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-color);
    }
    .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 10px 14px;
        background-color: var(--input-bg);
        border: 1px solid transparent;
        border-radius: 6px;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        background-color: white;
    }
    .btn-group {
        margin-top: 24px;
        display: flex;
        gap: 12px;
    }
    .btn-cancel {
        padding: 10px 24px;
        border-radius: 6px;
        border: 1px solid #ddd;
        background-color: white;
        color: var(--text-color);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
    }
    .btn-submit {
        padding: 10px 24px;
        border-radius: 6px;
        border: none;
        background-color: var(--secondary);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }
</style>

<div class="page-header">
    <a href="{% url 'intern_list' %}" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        Back
    </a>
    <h2>{{ 'Edit Intern' if intern else 'Add Intern' }}</h2>
</div>

<form method="POST">
    {% csrf_token %}
    
    <div class="section-card">
        <h4><i class="fas fa-user"></i> Personal Details</h4>
        <div class="form-row">
            <div class="form-group">
                <label>Full Name*</label>
                <input type="text" name="full_name" value="{{ intern.full_name if intern else '' }}" required>
            </div>
            <div class="form-group">
                <label>Personal Mail*</label>
                <input type="email" name="personal_mail" value="{{ intern.personal_mail if intern else '' }}" required>
            </div>
            <div class="form-group">
                <label>Phone No*</label>
                <input type="text" name="phone_no" value="{{ intern.phone_no if intern else '' }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Gender*</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option value="Male" {% if intern and intern.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if intern and intern.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if intern and intern.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Active" {% if not intern or intern.status == 'Active' %}selected{% endif %}>Active</option>
                    <option value="Completed" {% if intern and intern.status == 'Completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="section-card">
        <h4><i class="fas fa-briefcase"></i> Internship Details</h4>
        <div class="form-row">
            <div class="form-group">
                <label>Role*</label>
                <input type="text" name="role" value="{{ intern.role if intern else '' }}" required placeholder="e.g. Junior Developer">
            </div>
            <div class="form-group">
                <label>Internship Period*</label>
                <input type="text" name="internship_period" value="{{ intern.internship_period if intern else '' }}" required placeholder="e.g. 1 Month">
            </div>
            <div class="form-group">
                <label>Trainer</label>
                <select name="trainer">
                    <option value="">Select Trainer</option>
                    {% for trainer in trainers %}
                    <option value="{{ trainer.id }}" {% if intern and intern.trainer and intern.trainer.id == trainer.id %}selected{% endif %}>{{ trainer.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
    
    <div class="btn-group">
        <a href="{% url 'intern_list' %}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit">{{ 'Update Intern' if intern else 'Add Intern' }}</button>
    </div>
</form>
{% endblock %}
