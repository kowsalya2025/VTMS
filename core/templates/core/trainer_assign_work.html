{% extends 'core/base_trainer.html' %}

{% block page_title %}Interns Management{% endblock %}

{% block trainer_content %}
<style>
    .card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        margin-bottom: 24px;
    }
    .card-hdr-title {
        display: flex;
        align-items: center;
        gap:10px;
        margin-bottom: 20px;
    }
    .card-hdr-title .icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: #f5f5f5;
        display:flex;
        align-items:center;
        justify-content:center;
    }
    .card-hdr-title h3 {
        font-size: 16px;
        font-weight: 600;
        margin: 0;
        color: #333;
    }
    .form-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #333;
        font-weight:500;
    }
    .form-input {
        width:100%;
        padding: 10px 12px;
        border:1px solid #ddd;
        border-radius: 6px;
        background: #f5f5f5;
        font-size:14px;
    }
    .email-section {
        border:2px solid #66BB6A;
        border-radius: 12px;
        padding:24px;
    }
    .email-section-header {
        display: flex;
        align-items: center;
        gap:8px;
        margin-bottom:16px;
    }
    .email-section-header .check-icon {
        width: 24px;
        height:24px;
        background: #66BB6A;
        border-radius: 4px;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        font-size:12px;
    }
    .email-section-header span {
        font-size:14px;
        font-weight:600;
    }
</style>

<div style="margin-bottom: 20px;">
    <a href="{% url 'trainer_internship_management' %}" style="text-decoration: none; color:#333; font-weight:600; margin-bottom:20px; display:inline-block;">
        <i class="fas fa-arrow-left" style="margin-right:8px;"></i> Back
    </a>
    <h2 style="font-size:18px; font-weight:600; margin:0;">Assign Work</h2>
</div>

<div class="card">
    <div class="card-hdr-title">
        <div class="icon">
            <i class="fas fa-sticky-note" style="color: #3949AB;"></i>
        </div>
        <h3>Project Details</h3>
    </div>
    <div class="form-grid">
        <div class="form-group" style="grid-column: span 3;">
            <label>Project Name</label>
            <input type="text" class="form-input" placeholder="Project Name">
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="text" class="form-input" value="26/03/2026" readonly>
        </div>
        <div class="form-group">
            <label>Deadline</label>
            <input type="text" class="form-input" placeholder="DD/MM/YYYY">
        </div>
    </div>
</div>

<div class="card email-section">
    <div class="email-section-header">
        <div class="check-icon">
            <i class="fas fa-check"></i>
        </div>
        <span>Send Email to Trainees</span>
    </div>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">All Trainees will receive a email notification</p>

    <div class="form-grid">
        <div class="form-group">
            <label>From:</label>
            <input type="email" class="form-input" value="priya@vetriitsystems.com" readonly>
        </div>
        <div class="form-group">
            <label>To:</label>
            <input type="email" class="form-input" placeholder="Enter Recipient name or email">
        </div>
        <div class="form-group">
            <label>Subject:</label>
            <input type="text" class="form-input" placeholder="Enter Subject">
        </div>
        <div class="form-group" style="grid-column: span 3;">
            <label>Preview:</label>
            <textarea class="form-input" rows="4" placeholder="Type here..."></textarea>
        </div>
    </div>
</div>

<div style="display:flex; gap:16px; justify-content:flex-end;">
    <button class="btn-cancel" style="padding:12px 32px; border-radius:8px; border:1px solid #ddd; background:transparent; cursor:pointer; font-weight:600;">Cancel</button>
    <button class="btn-save" style="padding:12px 32px; border-radius:8px; border:none; background:#F59E0B; color:white; cursor:pointer; font-weight:600;">Send Email & Assign</button>
</div>
{% endblock %}
