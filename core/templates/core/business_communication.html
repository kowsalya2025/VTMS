{% extends 'core/base_business.html' %}

{% block page_title %}Communication{% endblock %}
{% block page_subtitle %}Send emails, WhatsApp messages, and share documents{% endblock %}

{% block business_content %}
<style>
    .tabs-container {
        display: flex;
        gap: 0;
        background: white;
        border-radius: 12px;
        padding: 6px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        margin-bottom: 24px;
    }
    .tab-button {
        flex: 1;
        padding: 12px 24px;
        border: none;
        background: transparent;
        color: var(--text-color);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
        font-family: var(--font-inter);
    }
    .tab-button.active {
        background: var(--secondary);
        color: white;
    }
    .tab-button:hover:not(.active) {
        background: #f8f9fc;
    }
    .form-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .form-card h4 {
        margin-top: 0;
        margin-bottom: 20px;
        color: var(--text-color);
        font-size: 18px;
        font-weight: 600;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-color);
        margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
        background: #f5f5f5;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--secondary);
        background: white;
    }
    .send-btn-container {
        text-align: right;
        margin-top: 24px;
    }
    .send-btn {
        background: var(--secondary);
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
    }
    .send-btn:hover {
        opacity: 0.9;
    }
</style>

<!-- Tabs -->
<div class="tabs-container">
    <button type="button" class="tab-button {% if active_tab == 'email' %}active{% endif %}" onclick="switchTab('email')">
        Send Email
    </button>
    <button type="button" class="tab-button {% if active_tab == 'whatsapp' %}active{% endif %}" onclick="switchTab('whatsapp')">
        Send Message
    </button>
</div>

<!-- Email Form -->
<div id="emailTab" class="form-card" {% if active_tab != 'email' %}style="display: none;"{% endif %}>
    <h4>Send Email</h4>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="hidden" name="active_tab" value="email">
        <div class="form-group">
            <label>From</label>
            <input type="email" value="{{ user.email }}" readonly>
        </div>
        <div class="form-group">
            <label>To</label>
            <select name="to" id="emailSelect" onchange="handleEmailSelect(this)" required>
                <option value="">Select Recipient</option>
                <optgroup label="Trainees">
                    {% for trainee in trainees %}
                    <option value="{{ trainee.personal_mail }}" data-name="{{ trainee.full_name }}">{{ trainee.full_name }} ({{ trainee.personal_mail }})</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Interns">
                    {% for intern in interns %}
                    <option value="{{ intern.personal_mail }}" data-name="{{ intern.full_name }}">{{ intern.full_name }} ({{ intern.personal_mail }})</option>
                    {% endfor %}
                </optgroup>
                <option value="custom">Custom Email...</option>
            </select>
            <input type="email" id="customEmailInput" name="to_custom" placeholder="Enter custom email" style="display: none; margin-top: 8px;">
        </div>
        <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" placeholder="Enter subject" required>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="body" rows="5" placeholder="Type here..." required></textarea>
        </div>
        <div class="form-group">
            <label>Attachments (optional)</label>
            <input type="file" name="attachments" multiple>
        </div>
        <div class="send-btn-container">
            <button type="submit" class="send-btn">
                <i class="fas fa-paper-plane"></i> Send Email
            </button>
        </div>
    </form>
</div>

<!-- WhatsApp Form -->
<div id="whatsappTab" class="form-card" {% if active_tab != 'whatsapp' %}style="display: none;"{% endif %}>
    <h4>Send WhatsApp Message</h4>
    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="active_tab" value="whatsapp">
        <div class="form-group">
            <label>Phone No</label>
            <select name="phone" id="phoneSelect" onchange="handlePhoneSelect(this)" required>
                <option value="">Select Recipient</option>
                <optgroup label="Trainees">
                    {% for trainee in trainees %}
                    <option value="{{ trainee.phone_no }}" data-name="{{ trainee.full_name }}">{{ trainee.full_name }} ({{ trainee.phone_no }})</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Interns">
                    {% for intern in interns %}
                    <option value="{{ intern.phone_no }}" data-name="{{ intern.full_name }}">{{ intern.full_name }} ({{ intern.phone_no }})</option>
                    {% endfor %}
                </optgroup>
                <option value="custom">Custom Phone...</option>
            </select>
            <input type="text" id="customPhoneInput" name="phone_custom" placeholder="Enter custom phone" style="display: none; margin-top: 8px;">
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" rows="5" placeholder="Type Message..." required></textarea>
        </div>
        <div class="send-btn-container">
            <button type="submit" class="send-btn">
                <i class="fab fa-whatsapp"></i> Send Message
            </button>
        </div>
    </form>
</div>

<script>
function switchTab(tab) {
    // Update URL without reloading
    const url = new URL(window.location);
    url.searchParams.set('tab', tab);
    window.history.replaceState({}, '', url);
    
    // Hide all tabs
    document.getElementById('emailTab').style.display = 'none';
    document.getElementById('whatsappTab').style.display = 'none';
    
    // Remove active class from all buttons
    document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
    
    // Show selected tab
    if (tab === 'email') {
        document.getElementById('emailTab').style.display = 'block';
    } else {
        document.getElementById('whatsappTab').style.display = 'block';
    }
    
    // Add active class to clicked button
    event.target.classList.add('active');
}

function handleEmailSelect(select) {
    const customInput = document.getElementById('customEmailInput');
    if (select.value === 'custom') {
        customInput.style.display = 'block';
        customInput.required = true;
    } else {
        customInput.style.display = 'none';
        customInput.required = false;
    }
}

function handlePhoneSelect(select) {
    const customInput = document.getElementById('customPhoneInput');
    if (select.value === 'custom') {
        customInput.style.display = 'block';
        customInput.required = true;
    } else {
        customInput.style.display = 'none';
        customInput.required = false;
    }
}
</script>
{% endblock %}
