{% extends 'core/base_trainer.html' %}

{% block page_title %}Attendance{% endblock %}

{% block trainer_content %}
<div class="card">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
        <button style="background-color: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">Mark Attendance</button>
    </div>
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f8f9fa;">
                <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Date</th>
                <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Batch</th>
                <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Present</th>
                <th style="padding: 12px; text-align: left; border-bottom: 1px solid #eee;">Absent</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="padding: 12px; border-bottom: 1px solid #eee;">2025-01-15</td>
                <td style="padding: 12px; border-bottom: 1px solid #eee;">Batch A</td>
                <td style="padding: 12px; border-bottom: 1px solid #eee;">22</td>
                <td style="padding: 12px; border-bottom: 1px solid #eee;">3</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}
