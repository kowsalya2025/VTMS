{% extends 'core/base_admin.html' %}

{% block page_title %}Edit Batch - Batch A{% endblock %}

{% block admin_content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Edit Batch</h2>
        <a href="{% url 'batch_detail' 1 %}" style="text-decoration: none; color: var(--primary); font-weight: 500;">Back to Detail</a>
    </div>
    
    <form method="POST" style="max-width: 800px;">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Batch Name</label>
            <input type="text" name="batch_name" value="Batch A - Python Full Stack" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Course</label>
                <select name="course" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option>Python Full Stack</option>
                    <option>Data Science</option>
                    <option>Web Development</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Trainer</label>
                <select name="trainer" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option>John Doe</option>
                    <option>Jane Smith</option>
                </select>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Start Date</label>
                <input type="date" name="start_date" value="2026-01-15" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">End Date</label>
                <input type="date" name="end_date" value="2026-06-15" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Timing Start</label>
                <input type="time" name="timing_start" value="09:00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Timing End</label>
                <input type="time" name="timing_end" value="11:00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">Status</label>
            <select name="status" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                <option>Active</option>
                <option>Upcoming</option>
                <option>Completed</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" style="background-color: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Update Batch</button>
            <a href="{% url 'batch_list' %}" style="background-color: var(--accent-light-orange); color: var(--text-color); padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
