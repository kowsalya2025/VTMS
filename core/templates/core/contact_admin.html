{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-color: #f5f5f5;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .login-container {
        width: 90%;
        max-width: 500px;
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .login-container h2 {
        font-family: 'Poppins', sans-serif;
        font-size: 24px;
        color: #2b2b2b;
        margin: 0 0 8px 0;
    }
    .login-container .subtext {
        color: #6b6b6b;
        font-size: 14px;
        margin-bottom: 32px;
        font-family: 'Inter', sans-serif;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #2b2b2b;
        margin-bottom: 8px;
        font-family: 'Inter', sans-serif;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        background: #f0f0f0;
        box-sizing: border-box;
    }
    .form-group textarea {
        min-height: 120px;
        resize: vertical;
    }
    .submit-btn {
        width: 100%;
        background: #ffa726;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s;
        margin-bottom: 16px;
    }
    .submit-btn:hover {
        background: #e6951f;
    }
    .back-link {
        text-align: center;
    }
    .back-link a {
        color: #5239d2;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        font-family: 'Inter', sans-serif;
    }
    .message-list {
        margin-bottom: 16px;
    }
    .message-item {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 8px;
        font-family: 'Inter', sans-serif;
    }
    .message-item.error {
        background: #ffefef;
        color: #d20909;
        border: 1px solid #ffd0d0;
    }
    .message-item.success {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
    }
</style>

<div class="login-container">
    <h2>Contact Admin</h2>
    <p class="subtext">Fill out the form below and admin will contact you soon</p>

    {% if messages %}
    <div class="message-list">
        {% for message in messages %}
        <div class="message-item {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" placeholder="Describe your login issue or query..." required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
    
    <div class="back-link">
        <a href="{% url 'login' %}">← Back to Login</a>
    </div>
</div>
{% endblock %}
