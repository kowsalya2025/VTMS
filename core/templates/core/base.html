<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTMS - Vetri Training Management System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <style>
        :root {
            --bg-color: #F5F5F5;
            --primary: #3B2E7E;
            --secondary: #FFA726;
            --text-color: #2B2B2B;
            --accent-green: #0E9D24;
            --accent-light-green: #CDFFD4;
            --accent-light-orange: #FFE9C9;
            --accent-red: #D20909;
            --accent-light-red: #FFDFDF;
            --accent-purple: #5239D2;
            --accent-light-purple: #DCD5FF;
            --input-bg: #E8E8E8;
            --icon-color: #6B6B6B;
            --white: #FFFFFF;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            color: var(--primary);
        }
        * {
            box-sizing: border-box;
        }
        a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
        }
        button {
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: var(--secondary);
            color: var(--white);
            padding: 12px 24px;
            width: 100%;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            margin-bottom: 16px;
            transition: border 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border: 1px solid var(--accent-purple);
        }
        label {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>
